---

named_static_groups:
  - named_group: "qk_norm"
    use_qk_norm: [true]
    use_qk_norm_scale: [true]

  - named_group: "peri_ln"
    use_pre_ln: [true]
    use_peri_ln: [true]
    use_post_ln: [false]

  - named_group: "rotary"
    use_rotary_embeddings: [true]
    use_abs_pos_embeddings: [false]

  - named_group: "softmax_attn"
    attention_variant: ["causal"]
    softmax_variant_attn: ["softmax"]

  - named_group: "infinite_nowv_attn"
    attention_variant: ["infinite_nowv"]
    softmax_variant_attn: ["softmax"]

common_group:
  dataset: ["minipile"]
  eval_interval: [2500]
  max_iters: [10000]
  never_save_checkpoint: [true]
  compile: [true]
  log_rankme: [true]
  log_areq: [true]
  n_layer: [6]
  n_head: [3]
  n_kv_group: [3]
  n_qk_head_dim: [100]
  n_v_head_dim: [100]
  n_embd: [300]

parameter_groups:
  - named_group_static:
      - "qk_norm"
      - "peri_ln"
      - "rotary"
      - "softmax_attn"
  - named_group_static:
      - "qk_norm"
      - "peri_ln"
      - "rotary"
      - "infinite_nowv_attn"
