# default_inf_lsa_init_mlp_swiglu.yaml
---

named_static_groups:
  # QK Norm
  - named_group: "qk_norm"
    use_qk_norm: [true]
    use_qk_norm_scale: [true]

  # Norm Type
  - named_group: "peri_ln"
    use_pre_ln: [true]
    use_peri_ln: [true]
    use_post_ln: [false]

  # Position Embeddings
  - named_group: "rotary"
    use_rotary_embeddings: [true]
    use_abs_pos_embeddings: [false]

  # Relu2Max
  - named_group: "relu2max"
    softmax_variant_attn: ["relu2max"]

  # Infinite Attention
  - named_group: "infinite"
    attention_variant: ["infinite"]
    use_concat_heads: [true]

  # MQA
  - named_group: "mqa"
    n_kv_group: [1]

  # Head Dimension
  - named_group: "hd_100"
    n_qk_head_dim: [100]
    n_v_head_dim: [100]

common_group:
  dataset: ["minipile"]
  eval_interval: [2500]
  max_iters: [10000]
  never_save_checkpoint: [false]
  compile: [true]
  log_rankme: [true]
  log_areq: [true]

parameter_groups:
  - named_group_static:
      - "qk_norm"
      - "peri_ln"
      - "rotary"
      - "infinite"
      - "hd_100"
    mlp_variant: ["mlp", "swiglu"]
    activation_variant: ["learned_spline"]
    lsa_init_activation: ["mish", "silu", "gelu", "squared_relu", "identity", "relu"]
