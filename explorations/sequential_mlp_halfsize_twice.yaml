# Same-ish MLP parameter budget exploration:
# two MLP ops per block with each MLP width split to ~half via match_sequential_mlp_param_budget.
---
max_iters: [20000]
eval_interval: [500]
dataset: ["minipile"]
device: ["cuda"]
dtype: ["float16"]
compile: [true]

n_layer: [6]
n_head: [6]
n_embd: [384]
block_size: [256]

use_rotary_embeddings: [true]
use_abs_pos_embeddings: [false]
use_pre_ln: [true]

use_sequential_ops: [true]
sequence_intermediate_skip_connections: [true]
sequence_final_skip_connection: [true]

# Key control: with two MLP ops in sequence this splits each MLP hidden dim by ~2.
match_sequential_mlp_param_budget: [true]

# One attention, two MLPs: attn -> mlp -> mlp
block_operation_sequence:
  - ["attn", "mlp", "mlp"]
