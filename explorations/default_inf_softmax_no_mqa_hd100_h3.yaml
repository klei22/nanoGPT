# Variant of default_inf.yaml:
# - softmax attention (instead of relu2max)
# - no MQA
# - fixed head dim 100 and 3 heads
---

named_static_groups:
  # QK Norm
  - named_group: "qk_norm"
    use_qk_norm: [true]
    use_qk_norm_scale: [true]

  # Norm Type
  - named_group: "peri_ln"
    use_pre_ln: [true]
    use_peri_ln: [true]
    use_post_ln: [false]

  # Position Embeddings
  - named_group: "rotary"
    use_rotary_embeddings: [true]
    use_abs_pos_embeddings: [false]

  # Softmax
  - named_group: "softmax"
    softmax_variant_attn: ["softmax"]

  # Infinite Attention
  - named_group: "infinite"
    attention_variant: ["infinite"]
    use_concat_heads: [true]

  # Head Dimension (fixed)
  - named_group: "hd_100"
    n_qk_head_dim: [100]
    n_v_head_dim: [100]

common_group:
  dataset: ["minipile"]
  eval_interval: [2500]
  max_iters: [10000]
  never_save_checkpoint: [true]
  compile: [true]
  log_rankme: [true]
  log_areq: [true]

parameter_groups:
  - named_group_static:
      - "qk_norm"
      - "peri_ln"
      - "rotary"
      - "softmax"
      - "infinite"
      - "hd_100"
    n_head: [3]
