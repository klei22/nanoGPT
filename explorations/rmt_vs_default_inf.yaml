# rmt_vs_default_inf.yaml
#
# Compare the Residual Matrix Transformer (RMT) against the default infinite
# attention baseline.  Both architectures share rotary embeddings, QK norm,
# peri-LN, and are sized around the GPT2-small baseline (n_embd=384).
#
# RMT base: rmt_rank=6, rmt_dv=64 → R*Dv = 384 (matching the baseline's
# effective embedding dim for core attention/FF).  At rmt_dk=6, n_embd =
# 6*64 = 384 (identical residual stream size).  Scaling rmt_dk to 12 or 24
# doubles/quadruples the residual stream for < 1% param/FLOP increase.
#
# Infinite attention base: n_embd=384, n_head=6, head_dim=64.
---

named_static_groups:
  # ── Shared settings applied to all runs ──────────────────────────────
  - named_group: "rotary_no_abs"
    use_rotary_embeddings: [true]
    use_abs_pos_embeddings: [false]

  - named_group: "qk_norm"
    use_qk_norm: [true]
    use_qk_norm_scale: [true]

  - named_group: "peri_ln"
    use_pre_ln: [true]
    use_peri_ln: [true]
    use_post_ln: [false]

  # ── RMT settings ─────────────────────────────────────────────────────
  - named_group: "rmt_base"
    attention_variant: ["rmt"]
    mlp_variant: ["rmt"]
    rmt_dv: [64]
    rmt_rank: [6]

  # ── Infinite attention settings ──────────────────────────────────────
  - named_group: "inf_base"
    attention_variant: ["infinite"]
    use_concat_heads: [true]
    n_v_head_dim: [64]
    n_qk_head_dim: [64]
    n_head: [6]
    n_embd: [384]

  # ── Softmax variants ─────────────────────────────────────────────────
  - named_group: "softmax"
    softmax_variant_attn: ["softmax"]

  - named_group: "relu2max"
    softmax_variant_attn: ["relu2max"]

common_group:
  dataset: ["minipile"]
  eval_interval: [2500]
  max_iters: [10000]
  never_save_checkpoint: [true]
  compile: [true]

parameter_groups:
  # ── RMT: scale residual stream via rmt_dk (softmax) ──────────────────
  # rmt_dk=6  → n_embd = 6*64  = 384  (same as baseline)
  # rmt_dk=12 → n_embd = 12*64 = 768  (2× residual, ~same compute)
  # rmt_dk=24 → n_embd = 24*64 = 1536 (4× residual, ~same compute)
  - named_group_static:
      - "rotary_no_abs"
      - "qk_norm"
      - "peri_ln"
      - "rmt_base"
      - "softmax"
    rmt_dk:
      values: [6, 12, 24]
    n_embd:
      values: [384, 768, 1536]

  # ── RMT: scale residual stream via rmt_dk (relu2max) ─────────────────
  - named_group_static:
      - "rotary_no_abs"
      - "qk_norm"
      - "peri_ln"
      - "rmt_base"
      - "relu2max"
    rmt_dk:
      values: [6, 12, 24]
    n_embd:
      values: [384, 768, 1536]

  # ── Infinite attention baseline (softmax) ────────────────────────────
  - named_group_static:
      - "rotary_no_abs"
      - "qk_norm"
      - "peri_ln"
      - "inf_base"
      - "softmax"

  # ── Infinite attention baseline (relu2max) ───────────────────────────
  - named_group_static:
      - "rotary_no_abs"
      - "qk_norm"
      - "peri_ln"
      - "inf_base"
      - "relu2max"
