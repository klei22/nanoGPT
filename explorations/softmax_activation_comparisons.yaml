# default.yaml using named group mechanisms from sample.yaml
---

named_static_groups:
  # QK Norm
  - named_group: "qk_norm"
    use_qk_norm: [true]
    use_qk_norm_scale: [true]

  - named_group: "no_qk_norm"
    use_qk_norm: [false]
    use_qk_norm_scale: [false]

  # Norm Type
  - named_group: "peri_ln"
    use_pre_ln: [true]
    use_peri_ln: [true]
    use_post_ln: [false]

  # Position Embeddings
  - named_group: "rotary"
    use_rotary_embeddings: [true]
    use_abs_pos_embeddings: [false]

  # Embedding Norm
  - named_group: "rmsnorm_wte"
    norm_variant_wte: ["rmsnorm"]

  # MLP Activation
  - named_group: "squared_relu"
    activation_variant: ["squared_relu"]

  # Infinite Attention
  - named_group: "infinite"
    attention_variant: ["infinite"]
    use_concat_heads: [true]

  # Head Dimension
  - named_group: "hd_100"
    n_qk_head_dim: [100]
    n_v_head_dim: [100]

  - named_group: "hd_150"
    n_qk_head_dim: [150]
    n_v_head_dim: [150]

  - named_group: "hd_200"
    n_qk_head_dim: [200]
    n_v_head_dim: [200]

  # MQA
  - named_group: "mqa"
    n_kv_group: [1]

common_group:
  dataset: ["minipile"]
  eval_interval: [1000]
  eval_iters: [200]
  max_iters: [10000]
  never_save_checkpoint: [true]
  compile: [true]
  use_gradient_checkpointing: [true]
  log_rankme: [true]
  log_areq: [true]

parameter_groups:
  - named_group_static:
      - "rotary"
      - "infinite"
      - "rmsnorm_wte"
    named_group_alternates: ["qk_norm", "no_qk_norm"]
    activation_variant: ["disco", "relu_power", "squared_relu"]
    relu_power: ["3.0"]
    n_qk_head_dim: [100]
    n_v_head_dim: [100]
    n_head: [3]
    softmax_variant_attn: ["sigmoidmax", "softmax", "relumax", "relu2max", "softplus", "softplus2max", "gelumax"]
