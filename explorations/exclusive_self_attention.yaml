# exclusive_self_attention.yaml
# Ablation: Exclusive Self Attention (XSA) vs default
# Tests XSA with softmax and relu2max variants for both causal and infinite attention
---

named_static_groups:
  # QK Norm
  - named_group: "qk_norm"
    use_qk_norm: [true]
    use_qk_norm_scale: [true]

  # Norm Type
  - named_group: "peri_ln"
    use_pre_ln: [true]
    use_peri_ln: [true]
    use_post_ln: [false]

  # Position Embeddings
  - named_group: "rotary"
    use_rotary_embeddings: [true]
    use_abs_pos_embeddings: [false]

  # Embedding Norm
  - named_group: "rmsnorm_wte"
    norm_variant_wte: ["rmsnorm"]

  # MLP Activation
  - named_group: "squared_relu"
    activation_variant: ["squared_relu"]

  # Softmax
  - named_group: "softmax"
    softmax_variant_attn: ["softmax"]

  # Relu2Max
  - named_group: "relu2max"
    softmax_variant_attn: ["relu2max"]

  # XSA enabled
  - named_group: "xsa_on"
    use_exclusive_self_attention: [true]

  # XSA disabled (baseline)
  - named_group: "xsa_off"
    use_exclusive_self_attention: [false]

common_group:
  dataset: ["minipile"]
  eval_interval: [1000]
  max_iters: [10000]
  never_save_checkpoint: [true]
  compile: [true]

parameter_groups:
  # Causal attention + softmax (baseline)
  - named_group_static:
      - "qk_norm"
      - "peri_ln"
      - "rotary"
      - "rmsnorm_wte"
      - "squared_relu"
      - "softmax"
      - "xsa_off"

  # Causal attention + softmax + XSA
  - named_group_static:
      - "qk_norm"
      - "peri_ln"
      - "rotary"
      - "rmsnorm_wte"
      - "squared_relu"
      - "softmax"
      - "xsa_on"

  # Causal attention + relu2max (baseline)
  - named_group_static:
      - "qk_norm"
      - "peri_ln"
      - "rotary"
      - "rmsnorm_wte"
      - "squared_relu"
      - "relu2max"
      - "xsa_off"

  # Causal attention + relu2max + XSA
  - named_group_static:
      - "qk_norm"
      - "peri_ln"
      - "rotary"
      - "rmsnorm_wte"
      - "squared_relu"
      - "relu2max"
      - "xsa_on"

  # Infinite attention + softmax (baseline)
  - attention_variant: ["infinite"]
    use_concat_heads: [true]
    named_group_static:
      - "qk_norm"
      - "peri_ln"
      - "rotary"
      - "rmsnorm_wte"
      - "squared_relu"
      - "softmax"
      - "xsa_off"

  # Infinite attention + softmax + XSA
  - attention_variant: ["infinite"]
    use_concat_heads: [true]
    named_group_static:
      - "qk_norm"
      - "peri_ln"
      - "rotary"
      - "rmsnorm_wte"
      - "squared_relu"
      - "softmax"
      - "xsa_on"

  # Infinite attention + relu2max (baseline)
  - attention_variant: ["infinite"]
    use_concat_heads: [true]
    named_group_static:
      - "qk_norm"
      - "peri_ln"
      - "rotary"
      - "rmsnorm_wte"
      - "squared_relu"
      - "relu2max"
      - "xsa_off"

  # Infinite attention + relu2max + XSA
  - attention_variant: ["infinite"]
    use_concat_heads: [true]
    named_group_static:
      - "qk_norm"
      - "peri_ln"
      - "rotary"
      - "rmsnorm_wte"
      - "squared_relu"
      - "relu2max"
      - "xsa_on"
