# Compare default cross-entropy vs ReLU^2-normalized cross-entropy
# while keeping the "softmax" attention path from default_inf.yaml.
---

named_static_groups:
  - named_group: "qk_norm"
    use_qk_norm: [true]
    use_qk_norm_scale: [true]

  - named_group: "peri_ln"
    use_pre_ln: [true]
    use_peri_ln: [true]
    use_post_ln: [false]

  - named_group: "rotary"
    use_rotary_embeddings: [true]
    use_abs_pos_embeddings: [false]

  - named_group: "rmsnorm_wte"
    norm_variant_wte: ["rmsnorm"]

  - named_group: "squared_relu"
    activation_variant: ["squared_relu"]

  - named_group: "softmax"
    softmax_variant_attn: ["softmax"]

  - named_group: "infinite"
    attention_variant: ["infinite"]
    use_concat_heads: [true]

  - named_group: "mqa"
    n_kv_group: [1]

  - named_group: "hd_100"
    n_qk_head_dim: [100]
    n_v_head_dim: [100]

common_group:
  dataset: ["minipile"]
  max_iters: [10000]
  eval_interval: [2500]
  never_save_checkpoint: [true]
  compile: [true]
  log_rankme: [true]
  log_areq: [true]

parameter_groups:
  - named_group_static:
      - "qk_norm"
      - "peri_ln"
      - "rotary"
      - "rmsnorm_wte"
      - "squared_relu"
      - "softmax"
      - "infinite"
      - "mqa"
      - "hd_100"
    n_head: [8]
    loss_fn: ["cross_entropy", "relu2_cross_entropy"]
