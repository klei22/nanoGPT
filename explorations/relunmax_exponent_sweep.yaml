# Sweep comparing ReLUNMax (configurable exponent) vs ReLU2Max vs Softmax baseline
---

named_static_groups:
  # QK Norm
  - named_group: "qk_norm"
    use_qk_norm: [true]
    use_qk_norm_scale: [true]

  # Norm Type
  - named_group: "peri_ln"
    use_pre_ln: [true]
    use_peri_ln: [true]
    use_post_ln: [false]

  # Position Embeddings
  - named_group: "rotary"
    use_rotary_embeddings: [true]
    use_abs_pos_embeddings: [false]

  # Embedding Norm
  - named_group: "rmsnorm_wte"
    norm_variant_wte: ["rmsnorm"]

  # MLP Activation
  - named_group: "squared_relu"
    activation_variant: ["squared_relu"]

  # Softmax baseline
  - named_group: "softmax"
    softmax_variant_attn: ["softmax"]

  # ReLU2Max (fixed exponent=2)
  - named_group: "relu2max"
    softmax_variant_attn: ["relu2max"]

  # Infinite Attention
  - named_group: "infinite"
    attention_variant: ["infinite"]
    use_concat_heads: [true]

  # MQA
  - named_group: "mqa"
    n_kv_group: [1]

common_group:
  dataset: ["minipile"]
  eval_interval: [2500]
  max_iters: [10000]
  never_save_checkpoint: [true]
  compile: [true]
  log_rankme: [true]
  log_areq: [true]

parameter_groups:
  # Softmax baseline
  - named_group_static:
      - "qk_norm"
      - "peri_ln"
      - "rotary"
      - "softmax"
      - "infinite"
      - "mqa"
    n_head: [6]

  # ReLU2Max baseline (exponent=2, hardcoded)
  - named_group_static:
      - "qk_norm"
      - "peri_ln"
      - "rotary"
      - "relu2max"
      - "infinite"
      - "mqa"
    n_head: [6]

  # ReLUNMax with various exponents
  - named_group_static:
      - "qk_norm"
      - "peri_ln"
      - "rotary"
      - "infinite"
      - "mqa"
    softmax_variant_attn: ["relunmax"]
    relunmax_exponent: [1.0, 1.5, 2.0, 2.5, 3.0, 4.0]
    n_head: [6]
