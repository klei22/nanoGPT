---
# Compare classic absolute embeddings, RoPE, and cyclic absolute embeddings.

named_static_groups:
  - named_group: "abs_default"
    named_group_settings:
      use_abs_pos_embeddings: [true]
      abs_pos_embedding_variant: ["default"]
      use_rotary_embeddings: [false]

  - named_group: "rope_only"
    named_group_settings:
      use_abs_pos_embeddings: [false]
      use_rotary_embeddings: [true]

  - named_group: "abs_cyclic"
    named_group_settings:
      use_abs_pos_embeddings: [true]
      abs_pos_embedding_variant: ["cyclic"]
      abs_pos_cyclic_periods: [[31, 47, 97]]
      abs_pos_cyclic_random_start: [true]
      use_rotary_embeddings: [false]

common_group:
  dataset: ["shakespeare_char"]
  max_iters: [2000]
  eval_interval: [500]
  batch_size: [64]
  n_layer: [4]
  n_head: [4]
  n_embd: [256]
  block_size: [128]

parameter_groups:
  - out_dir: ["out_abs_default"]
    named_group_static: ["abs_default"]

  - out_dir: ["out_rope_only"]
    named_group_static: ["rope_only"]

  - out_dir: ["out_abs_cyclic"]
    named_group_static: ["abs_cyclic"]
