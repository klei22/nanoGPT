# Compare hyperbolic / relu2max infinite-attention runs against a baseline.
# Baseline = softmax attention, and explicitly *not* MQA.
---

named_static_groups:
  # QK Norm
  - named_group: "qk_norm"
    use_qk_norm: [true]
    use_qk_norm_scale: [true]

  # Norm Type
  - named_group: "peri_ln"
    use_pre_ln: [true]
    use_peri_ln: [true]
    use_post_ln: [false]

  # Position Embeddings
  - named_group: "rotary"
    use_rotary_embeddings: [true]
    use_abs_pos_embeddings: [false]

  # MLP Activation
  - named_group: "squared_relu"
    activation_variant: ["squared_relu"]

  # Attention Softmax Variant
  - named_group: "relu2max"
    softmax_variant_attn: ["relu2max"]

  - named_group: "softmax"
    softmax_variant_attn: ["softmax"]

  # Infinite Attention
  - named_group: "infinite"
    attention_variant: ["infinite"]
    use_concat_heads: [true]

  # Head Dimension
  - named_group: "hd_100"
    n_qk_head_dim: [100]
    n_v_head_dim: [100]

  - named_group: "hd_150"
    n_qk_head_dim: [150]
    n_v_head_dim: [150]

  - named_group: "hd_200"
    n_qk_head_dim: [200]
    n_v_head_dim: [200]

  # Full KV groups (not MQA)
  - named_group: "no_mqa"
    n_head: [12]
    n_kv_group: [12]

common_group:
  dataset: ["minipile"]
  eval_interval: [2500]
  max_iters: [10000]
  never_save_checkpoint: [true]
  compile: [true]
  log_rankme: [true]
  log_areq: [true]

parameter_groups:
  # Experiment arm (non-baseline): relu2max + no MQA
  - named_group_static:
      - "qk_norm"
      - "peri_ln"
      - "rotary"
      - "squared_relu"
      - "relu2max"
      - "infinite"
      - "no_mqa"
    named_group_alternates: ["hd_100", "hd_150", "hd_200"]

  # Baseline arm: softmax + no MQA
  - named_group_static:
      - "qk_norm"
      - "peri_ln"
      - "rotary"
      - "squared_relu"
      - "softmax"
      - "infinite"
      - "no_mqa"
    named_group_alternates: ["hd_100", "hd_150", "hd_200"]
