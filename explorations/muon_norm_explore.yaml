# muon_norm_explore.yaml
# Based on explorations/default_inf.yaml, extended to sweep Muon routing/update knobs
# and compare HyperSphereNorm vs RMSNorm.
---

named_static_groups:
  # QK Norm
  - named_group: "qk_norm"
    use_qk_norm: [true]
    use_qk_norm_scale: [true]

  # Norm Type
  - named_group: "peri_ln"
    use_pre_ln: [true]
    use_peri_ln: [true]
    use_post_ln: [false]

  # Position Embeddings
  - named_group: "rotary"
    use_rotary_embeddings: [true]
    use_abs_pos_embeddings: [false]

  # MLP Activation
  - named_group: "squared_relu"
    activation_variant: ["squared_relu"]

  # Softmax family
  - named_group: "relu2max"
    softmax_variant_attn: ["relu2max"]
  - named_group: "softmax"
    softmax_variant_attn: ["softmax"]

  # Infinite Attention
  - named_group: "infinite"
    attention_variant: ["infinite"]
    use_concat_heads: [true]

  # MQA
  - named_group: "mqa"
    n_kv_group: [1]

  # Head Dimension
  - named_group: "hd_100"
    n_qk_head_dim: [100]
    n_v_head_dim: [100]
  - named_group: "hd_150"
    n_qk_head_dim: [150]
    n_v_head_dim: [150]
  - named_group: "hd_200"
    n_qk_head_dim: [200]
    n_v_head_dim: [200]

  # Optimizer
  - named_group: "muon_default"
    optimizer: ["muon"]
    muon_momentum: [0.95]
    muon_ns_steps: [5]
    muon_nesterov: [true]
    muon_include_all_weights: [false]
    muon_min_ndim: [2]
    muon_exclude_substrings: ["embed", "wte", "wpe", "lm_head"]

  # Norm alternates for comparison
  - named_group: "rmsnorm_pair"
    norm_variant_attn: ["rmsnorm"]
    norm_variant_output: ["rmsnorm"]
  - named_group: "hypersphere_pair"
    norm_variant_attn: ["hyperspherenorm"]
    norm_variant_output: ["hyperspherenorm"]
    hsnorm_scale: [1.0]
    hsnorm_gain: [false]
    hsnorm_radius_learning: [false]

common_group:
  dataset: ["minipile"]
  eval_interval: [2500]
  max_iters: [10000]
  never_save_checkpoint: [true]
  compile: [true]
  log_rankme: [true]
  log_areq: [true]

parameter_groups:
  # relu2max + RMSNorm
  - named_group_static:
      - "qk_norm"
      - "peri_ln"
      - "rotary"
      - "relu2max"
      - "infinite"
      - "mqa"
      - "muon_default"
      - "rmsnorm_pair"
    n_head:
      range:
        start: 1
        end: 12
        step: 1
    named_group_alternates: ["hd_100", "hd_150", "hd_200"]

  # relu2max + HyperSphereNorm
  - named_group_static:
      - "qk_norm"
      - "peri_ln"
      - "rotary"
      - "relu2max"
      - "infinite"
      - "mqa"
      - "muon_default"
      - "hypersphere_pair"
    n_head:
      range:
        start: 1
        end: 12
        step: 1
    named_group_alternates: ["hd_100", "hd_150", "hd_200"]

  # softmax + RMSNorm
  - named_group_static:
      - "qk_norm"
      - "peri_ln"
      - "rotary"
      - "softmax"
      - "infinite"
      - "mqa"
      - "muon_default"
      - "rmsnorm_pair"
    n_head:
      range:
        start: 1
        end: 12
        step: 1
    named_group_alternates: ["hd_100", "hd_150", "hd_200"]

  # softmax + HyperSphereNorm
  - named_group_static:
      - "qk_norm"
      - "peri_ln"
      - "rotary"
      - "softmax"
      - "infinite"
      - "mqa"
      - "muon_default"
      - "hypersphere_pair"
    n_head:
      range:
        start: 1
        end: 12
        step: 1
    named_group_alternates: ["hd_100", "hd_150", "hd_200"]
