# Compare baseline vs dual_wte_glu_head using default_inf-inspired settings.
---

named_static_groups:
  - named_group: "qk_norm"
    use_qk_norm: [true]
    use_qk_norm_scale: [true]

  - named_group: "peri_ln"
    use_pre_ln: [true]
    use_peri_ln: [true]
    use_post_ln: [false]

  - named_group: "rotary"
    use_rotary_embeddings: [true]
    use_abs_pos_embeddings: [false]

  - named_group: "softmax"
    softmax_variant_attn: ["softmax"]

  - named_group: "infinite"
    attention_variant: ["infinite"]
    use_concat_heads: [true]

  - named_group: "mqa"
    n_kv_group: [1]

  # Keep architecture equal for a fair comparison.
  - named_group: "hd_100_h3"
    n_head: [3]
    n_qk_head_dim: [100]
    n_v_head_dim: [100]

  - named_group: "baseline"
    dual_wte_glu_head: [false]

  - named_group: "dual_wte_glu"
    dual_wte_glu_head: [true]

common_group:
  dataset: ["minipile"]
  eval_interval: [2500]
  max_iters: [10000]
  never_save_checkpoint: [true]
  compile: [true]
  log_rankme: [true]
  log_areq: [true]

parameter_groups:
  - named_group_static:
      - "qk_norm"
      - "peri_ln"
      - "rotary"
      - "softmax"
      - "infinite"
      - "mqa"
      - "hd_100_h3"
      - "baseline"

  - named_group_static:
      - "qk_norm"
      - "peri_ln"
      - "rotary"
      - "softmax"
      - "infinite"
      - "mqa"
      - "hd_100_h3"
      - "dual_wte_glu"
